<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Calculatrice</title>
</head>
<body>

    <h1>Calculatrice simple JS</h1>

    <!-- Corps calculatrice -->

    <div id="calcBody">

        <!-- écran -->

        <div id="calcScreen"></div>

        <!-- conteneur à touches -->

        <div id="conteneur">

            <button class="touches">1</button>
            <button class="touches">2</button>
            <button class="touches">3</button>
            <button class="touches">4</button>
            <button class="touches">5</button>
            <button class="touches">6</button>
            <button class="touches">7</button>
            <button class="touches">8</button>
            <button class="touches">9</button>
            <button class="touches">0</button>
            <button class="touches">(</button>
            <button class="touches">)</button>
            <button class="touches">/</button>
            <button class="touches">+</button>
            <button class="touches">-</button>
            <button class="touches">*</button>
            <button class="touches">.</button>
            <button id="calculer" >=</button>
            <button id="reset">C</button>
        
        </div>

      
        
        <div id="card">Designed by Tosb@s</div>

     </div>

    <script src="main.js"></script>
    
</body>

</html>
